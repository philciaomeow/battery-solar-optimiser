name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python test tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff voluptuous

      - name: Lint Python
        run: ruff check custom_components/battery_solar_optimiser tests

      - name: Compile Python
        run: python -m compileall custom_components/battery_solar_optimiser

      - name: Check dashboard JavaScript syntax
        run: |
          node --check www/bso-plan-card.js
          node --check www/bso-layout-card.js

      - name: Run tests
        run: pytest tests/ -v
