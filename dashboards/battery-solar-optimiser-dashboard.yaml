title: Battery Solar Optimiser
views:
  - title: Battery Solar Optimiser
    path: battery-solar-optimiser
    icon: mdi:solar-power-variant
    type: masonry
    cards:
      - type: markdown
        title: Battery Solar Optimiser
        content: |
          Simple 24-hour battery plan using Agile prices, solar forecast and your configured household load.

          Times are shown using the integration display timezone. Unknown Agile slots use the configured fallback price so the battery is not drained before unpublished rates.

      - type: entities
        title: Status
        show_header_toggle: false
        entities:
          - entity: sensor.battery_solar_optimiser_status
            name: Optimiser status
          - entity: sensor.battery_solar_optimiser_last_updated
            name: Plan last updated
          - entity: sensor.battery_solar_optimiser_next_update_due
            name: Next update due
          - entity: button.battery_solar_optimiser_recalculate
            name: Recalculate now
          - entity: select.battery_solar_optimiser_action
            name: Recommended action
          - entity: sensor.battery_solar_optimiser_plan
            name: Current slot action
          - entity: sensor.battery_solar_optimiser_next_action
            name: Current/next action window
          - entity: sensor.battery_solar_optimiser_estimated_cost
            name: Estimated 24h cost

      - type: custom:apexcharts-card
        graph_span: 24h
        span:
          start: hour
        header:
          show: true
          title: Projected battery level
          show_states: false
        yaxis:
          - min: 0
            max: 100
            decimals: 0
            apex_config:
              title:
                text: Battery %
        series:
          - entity: sensor.battery_solar_optimiser_plan
            name: Projected battery
            color: '#16a34a'
            type: area
            opacity: 0.25
            stroke_width: 3
            data_generator: |
              const slots = entity.attributes.slots || [];
              return slots.map((slot) => [new Date(slot.start).getTime(), Number(slot.battery_percent || 0)]);

      - type: custom:apexcharts-card
        graph_span: 24h
        span:
          start: hour
        header:
          show: true
          title: Agile price and solar forecast
          show_states: false
        yaxis:
          - id: price
            decimals: 1
            apex_config:
              title:
                text: p/kWh
          - id: solar
            opposite: true
            decimals: 2
            apex_config:
              title:
                text: kWh/slot
        series:
          - entity: sensor.battery_solar_optimiser_plan
            name: Agile price
            yaxis_id: price
            color: '#2563eb'
            type: column
            data_generator: |
              const slots = entity.attributes.slots || [];
              return slots.map((slot) => [new Date(slot.start).getTime(), Number(slot.price || 0)]);
          - entity: sensor.battery_solar_optimiser_plan
            name: Solar
            yaxis_id: solar
            color: '#f59e0b'
            type: line
            stroke_width: 3
            data_generator: |
              const slots = entity.attributes.slots || [];
              return slots.map((slot) => [new Date(slot.start).getTime(), Number(slot.solar_kwh || 0)]);

      - type: custom:html-template-card
        title: 24 hour slot plan
        ignore_line_breaks: true
        content: |
          {% set slots = state_attr('sensor.battery_solar_optimiser_plan', 'slots') or [] %}
          <style>
            .bso-plan-wrap { overflow-x: auto; }
            .bso-plan { width: 100%; border-collapse: collapse; font-size: .88rem; }
            .bso-plan th { position: sticky; top: 0; background: var(--card-background-color); z-index: 1; color: var(--secondary-text-color); font-weight: 700; }
            .bso-plan td, .bso-plan th { padding: 6px 8px; border-bottom: 1px solid var(--divider-color); text-align: right; white-space: nowrap; }
            .bso-plan td:first-child, .bso-plan th:first-child, .bso-plan td:nth-child(2), .bso-plan th:nth-child(2) { text-align: left; }
            .bso-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-weight: 700; }
            .bso-charge { background: #064e3b; color: #34d399; }
            .bso-discharge { background: #7f1d1d; color: #f87171; }
            .bso-hold { background: #374151; color: #d1d5db; }
            .bso-current { background: rgba(96,165,250,.16); }
            .bso-forced-charge { background: rgba(16,185,129,.20); }
            .bso-forced-discharge { background: rgba(239,68,68,.20); }
            .bso-override { font-size: .78rem; color: var(--secondary-text-color); }
          </style>
          <div class="bso-plan-wrap">
            <table class="bso-plan">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Status</th>
                  <th>Override</th>
                  <th>Agile</th>
                  <th>Bat %</th>
                  <th>Solar kWh</th>
                  <th>Slot cost</th>
                  <th>Daily cost</th>
                </tr>
              </thead>
              <tbody>
                {% for s in slots %}
                <tr class="{% if s.override == 'charge' %}bso-forced-charge{% elif s.override == 'discharge' %}bso-forced-discharge{% elif s.is_current %}bso-current{% endif %}">
                  <td><strong>{{ s.start_local }}</strong></td>
                  <td><span class="bso-badge {% if s.action == 'charging' %}bso-charge{% elif s.action == 'discharging' %}bso-discharge{% else %}bso-hold{% endif %}">{{ s.action }}</span></td>
                  <td class="bso-override">{% if s.override == 'charge' %}Force charge{% elif s.override == 'discharge' %}Force discharge{% else %}No change{% endif %}</td>
                  <td>{{ s.price | round(1) }}p</td>
                  <td>{{ s.battery_percent | round(0) }}%</td>
                  <td>{{ s.solar_kwh | round(2) }}</td>
                  <td>£{{ "%.2f" | format(s.slot_cost_gbp) }}</td>
                  <td>£{{ "%.2f" | format(s.cumulative_cost_gbp) }}</td>
                </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>


