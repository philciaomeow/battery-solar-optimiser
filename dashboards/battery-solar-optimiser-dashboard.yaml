title: Battery Solar Optimiser
views:
  - title: Battery Solar Optimiser
    path: battery-solar-optimiser
    icon: mdi:solar-power-variant
    type: panel
    cards:
      - type: custom:bso-layout-card
        header:
          type: markdown
          title: Battery Solar Optimiser
          content: |
            Simple 24-hour battery plan using Agile prices, solar forecast and your configured household load.

            Times are shown using the integration display timezone. Unknown Agile slots use the configured fallback price so the battery is not drained before unpublished rates.
        graphs:
          - type: custom:apexcharts-card
            graph_span: 24h
            span:
              start: hour
            header:
              show: true
              title: Projected battery level
              show_states: false
            yaxis:
              - min: 0
                max: 100
                decimals: 0
                apex_config:
                  title:
                    text: Battery %
            series:
              - entity: sensor.battery_solar_optimiser_plan
                name: Projected battery
                color: '#16a34a'
                type: area
                opacity: 0.25
                stroke_width: 3
                data_generator: |
                  const slots = entity.attributes.slots || [];
                  return slots.map((slot) => [new Date(slot.start).getTime(), Number(slot.battery_percent || 0)]);
          - type: custom:apexcharts-card
            graph_span: 24h
            span:
              start: hour
            header:
              show: true
              title: Agile price and solar forecast
              show_states: false
            yaxis:
              - id: price
                decimals: 1
                apex_config:
                  title:
                    text: p/kWh
              - id: solar
                opposite: true
                decimals: 2
                apex_config:
                  title:
                    text: kWh/slot
            series:
              - entity: sensor.battery_solar_optimiser_plan
                name: Agile price
                yaxis_id: price
                color: '#2563eb'
                type: column
                data_generator: |
                  const slots = entity.attributes.slots || [];
                  return slots.map((slot) => [new Date(slot.start).getTime(), Number(slot.price || 0)]);
              - entity: sensor.battery_solar_optimiser_plan
                name: Solar
                yaxis_id: solar
                color: '#f59e0b'
                type: line
                stroke_width: 3
                data_generator: |
                  const slots = entity.attributes.slots || [];
                  return slots.map((slot) => [new Date(slot.start).getTime(), Number(slot.solar_kwh || 0)]);
        plan:
          type: custom:bso-plan-card
          title: 24 hour slot plan
          entity: sensor.battery_solar_optimiser_plan
        status:
          type: entities
          title: Status
          show_header_toggle: false
          entities:
            - entity: sensor.battery_solar_optimiser_status
              name: Optimiser status
            - entity: sensor.battery_solar_optimiser_last_updated
              name: Plan last updated
            - entity: sensor.battery_solar_optimiser_next_update_due
              name: Next update due
            - entity: button.battery_solar_optimiser_recalculate
              name: Recalculate now
            - type: section
              label: Live tuning
            - entity: number.battery_solar_optimiser_minimum_reserve
              name: Minimum reserve — recommended 20%
            - entity: number.battery_solar_optimiser_discharge_aggressiveness
              name: Discharge aggressiveness — recommended 60%
            - entity: number.battery_solar_optimiser_battery_charge_rate
              name: Battery charge rate
            - type: section
              label: House load averaging
            - entity: switch.battery_solar_optimiser_use_average_house_load
              name: Use calculated average house load
            - entity: select.battery_solar_optimiser_house_load_average_period
              name: Average period
            - entity: sensor.battery_solar_optimiser_average_house_load
              name: Calculated average load
            - entity: number.battery_solar_optimiser_manual_house_load
              name: Manual house load — fallback 600 W
            - entity: select.battery_solar_optimiser_action
              name: Recommended action
            - entity: sensor.battery_solar_optimiser_plan
              name: Current slot action
            - entity: sensor.battery_solar_optimiser_next_action
              name: Current/next action window
            - entity: sensor.battery_solar_optimiser_estimated_cost
              name: Estimated 24h cost
        totals:
          type: markdown
          title: Totals
          content: >-
            {% set p = 'sensor.battery_solar_optimiser_plan' %}
            **Current slot:** {{ state_attr(p, 'current_slot_start_local') }}–{{ state_attr(p, 'current_slot_end_local') }}  
            **Initial battery:** {{ state_attr(p, 'initial_soc_kwh') }} kWh  
            **Average house load used:** {{ state_attr(p, 'effective_house_load_w') }} W
            **Average load source:** {{ state_attr(p, 'house_load_entity') or 'manual fallback' }} over {{ state_attr(p, 'house_load_average_period_hours') or 'manual' }}h
            **Total import:** {{ state_attr(p, 'total_import_kwh') }} kWh  
            **Total export:** {{ state_attr(p, 'total_export_kwh') }} kWh  
            **Estimated daily cost:** {{ states('sensor.battery_solar_optimiser_estimated_cost') }} GBP
        history:
          type: history-graph
          title: Optimiser history
          hours_to_show: 24
          entities:
            - entity: sensor.battery_solar_optimiser_plan
            - entity: sensor.battery_solar_optimiser_estimated_cost
            - entity: sensor.battery_solar_optimiser_next_action
